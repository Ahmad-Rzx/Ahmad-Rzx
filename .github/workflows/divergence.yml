name: 🔬 Divergence Meter — Daily Calibration

# ─────────────────────────────────────────────────────────────────────────────
# Runs daily at midnight UTC, regenerating assets/divergence_meter.svg
# and committing it back to the repo.
#
# Inspired by TriggersTools.SteinsGate nixie tube library:
# https://github.com/trigger-death/TriggersTools.SteinsGate
# Web tool: https://trigger-testing.github.io/pwa-examples/divergence-meter/
#
# Trigger manually anytime via Actions → "Run workflow"
# to test a new divergence reading without waiting for the schedule.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Daily at 00:00 UTC — updates the "LAST SYNC" timestamp in the SVG
    - cron: '0 0 * * *'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      reading:
        description: 'Divergence reading to display (e.g. 1.048596)'
        required: false
        default: '0.571046'

jobs:
  calibrate:
    name: Calibrate Divergence Meter
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the generated SVG

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Determine the reading ──────────────────────────────────────────────
      - name: Resolve divergence reading
        id: reading
        run: |
          # Use manual input if provided; otherwise fall back to default
          READING="${{ github.event.inputs.reading }}"
          if [ -z "$READING" ]; then
            READING="0.571046"
          fi
          echo "value=$READING" >> "$GITHUB_OUTPUT"
          echo "[FGL] Reading Steiner confirmed: $READING"

      # ── Generate the SVG ──────────────────────────────────────────────────
      - name: Generate nixie-tube divergence meter
        run: |
          mkdir -p assets
          python scripts/generate_divergence.py \
            "${{ steps.reading.outputs.value }}" \
            "assets/divergence_meter.svg"

      # ── Commit if anything changed ─────────────────────────────────────────
      - name: Commit updated meter to repository
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/divergence_meter.svg

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "[FGL] No changes detected — worldline stable."
          else
            git commit -m "🔬 Divergence meter calibrated: ${{ steps.reading.outputs.value }}% [skip ci]"
            git push
            echo "[FGL] Divergence meter updated. El Psy Kongroo."
          fi
